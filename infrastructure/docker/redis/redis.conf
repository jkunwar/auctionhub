# ── Redis configuration for AuctionHub development ───────────────────────────

# Persist data to disk so it survives container restarts
# RDB snapshot: save if at least 1 key changed in the last 3600 seconds
save 3600 1
# save if at least 100 keys changed in the last 300 seconds
save 300 100
# save if at least 10000 keys changed in the last 60 seconds
save 60 10000

# Memory management
# When Redis hits max memory, evict the least-recently-used keys
# This is important for our auction cache and WebSocket state
maxmemory-policy allkeys-lru

# Maximum memory Redis can use (adjust for your machine)
# 256mb is plenty for local development
maxmemory 256mb

# Enable AOF (Append Only File) for better durability
appendonly yes
appendfilename "appendonly.aof"

# Log level: debug | verbose | notice | warning
loglevel notice

# Allow connections from any IP inside Docker network
bind 0.0.0.0

# Default port
port 6379
