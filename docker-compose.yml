services:

  # ── PostgreSQL 15 ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: auctionhub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data          # persist data across restarts
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: auctionhub_redis
    restart: unless-stopped
    ports:
      - "6379:6379"        # host:container — access from your machine at localhost:6379
    volumes:
      - redis_data:/data                                # persist data across restarts
      - ./infrastructure/docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ── Named volumes (Docker manages these on your machine) ─────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
